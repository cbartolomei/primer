<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docs — Primer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%230a0a10'/><text y='.9em' font-size='78' font-weight='700' fill='%237c63f5' font-family='system-ui'>P</text></svg>">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c63f5">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Mark-as-read button ─────────────────────────────────── */
    .mark-read-btn {
      margin-left: auto;
      padding: 0.3em 0.8em;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: transparent;
      color: var(--muted, #7a8299);
      font-size: 0.72rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .mark-read-btn:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.2);
      color: #c0c8d8;
    }
    .mark-read-btn.is-read {
      background: rgba(20,184,166,0.12);
      border-color: rgba(20,184,166,0.3);
      color: #2dd4bf;
    }
    .mark-read-btn.is-read:hover {
      background: rgba(20,184,166,0.05);
      border-color: rgba(255,255,255,0.12);
      color: var(--muted, #7a8299);
    }

    /* ── Chapter prev/next nav ───────────────────────────────── */
    .chapter-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .chapter-nav-link {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      padding: 0.6rem 0.9rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
      max-width: 42%;
      min-width: 0;
    }
    .chapter-nav-link:hover {
      background: rgba(124,99,245,0.08);
      border-color: rgba(124,99,245,0.3);
    }
    .chapter-nav-dir {
      font-size: 0.67rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #5c6370;
    }
    .chapter-nav-title {
      font-size: 0.82rem;
      color: #9aa0b8;
      border: none !important;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chapter-nav-link:hover .chapter-nav-title { color: #a78bfa; }
    .chapter-nav-link.next { text-align: right; }
    .chapter-nav-home {
      font-size: 0.78rem;
      color: #5c6370;
      text-decoration: none;
      border: none !important;
      padding: 0.4rem;
      transition: color 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .chapter-nav-home:hover { color: #a78bfa; }

    /* ── Docs layout ──────────────────────────────────────── */
    .docs-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 0;
      max-width: 1200px;
      margin: 0 auto;
      align-items: start;
      padding: 0 1.5rem 4rem;
    }

    /* ── TOC column wrapper ───────────────────────────────── */
    .docs-toc-col {
      position: sticky;
      top: 1.5rem;
      max-height: calc(100vh - 5rem);
      overflow-y: auto;
      padding: 1rem 1.5rem 1rem 0;
      border-right: 1px solid rgba(255,255,255,0.06);
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }

    .docs-toc-col::-webkit-scrollbar { width: 4px; }
    .docs-toc-col::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .toc-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #5c6370;
      margin-bottom: 0.75rem;
      padding-left: 0.25rem;
    }

    .toc-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .toc-list a {
      display: block;
      padding: 0.25rem 0.5rem;
      font-size: 0.8rem;
      color: #7a8299;
      text-decoration: none;
      border-radius: 5px;
      border-left: 2px solid transparent;
      line-height: 1.4;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
    }

    .toc-list a:hover {
      color: #c0c8d8;
      background: rgba(255,255,255,0.04);
    }

    .toc-list a.active {
      color: #a78bfa;
      border-left-color: #7c63f5;
      background: rgba(124,99,245,0.08);
    }

    .toc-h1 a { font-weight: 600; font-size: 0.82rem; }
    .toc-h2 a { padding-left: 0.5rem; }
    .toc-h3 a { padding-left: 1.25rem; font-size: 0.77rem; }
    .toc-h4 a { padding-left: 2rem; font-size: 0.74rem; color: #5c6370; }

    /* ── Main doc content ─────────────────────────────────── */
    .docs-content {
      min-width: 0; /* prevent grid blowout */
      padding: 1rem 0 1rem 2.5rem;
    }

    .docs-content h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #e8e4ff;
      margin: 0 0 0.4rem;
      line-height: 1.2;
    }

    .docs-content h2 {
      font-size: 1.35rem;
      font-weight: 700;
      color: #c8c0f8;
      margin: 2.5rem 0 0.75rem;
      padding-top: 0.5rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .docs-content h3 {
      font-size: 1.05rem;
      font-weight: 600;
      color: #a78bfa;
      margin: 1.75rem 0 0.5rem;
    }

    .docs-content h4 {
      font-size: 0.9rem;
      font-weight: 600;
      color: #7a8299;
      margin: 1.25rem 0 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .docs-content p {
      color: #b0b8cc;
      line-height: 1.75;
      margin: 0 0 1rem;
    }

    .docs-content a {
      color: #a78bfa;
      text-decoration: none;
      border-bottom: 1px solid rgba(167,139,250,0.3);
      transition: border-color 0.15s;
    }
    .docs-content a:hover { border-bottom-color: #a78bfa; }

    .docs-content ul,
    .docs-content ol {
      color: #b0b8cc;
      padding-left: 1.5rem;
      margin: 0 0 1rem;
    }

    .docs-content li { margin-bottom: 0.35rem; line-height: 1.7; }

    .docs-content blockquote {
      margin: 1.25rem 0;
      padding: 0.75rem 1.25rem;
      border-left: 3px solid #7c63f5;
      background: rgba(124,99,245,0.07);
      border-radius: 0 8px 8px 0;
      color: #9aa0b8;
      font-style: italic;
    }
    .docs-content blockquote p { margin-bottom: 0; color: inherit; }

    .docs-content hr {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin: 2rem 0;
    }

    .docs-content pre {
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      overflow-x: auto;
      margin: 1rem 0 1.25rem;
      font-size: 0.82rem;
      line-height: 1.6;
    }

    .docs-content pre code {
      background: none;
      padding: 0;
      color: #abb2bf;
      font-size: inherit;
    }

    .docs-content code {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-size: 0.84em;
      color: #e5c07b;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    /* ── Source attribution ───────────────────────────────── */
    .doc-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-wrap: wrap;
    }

    .doc-meta-badge {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: rgba(124,99,245,0.15);
      color: #a78bfa;
      border: 1px solid rgba(124,99,245,0.25);
      padding: 0.2em 0.7em;
      border-radius: 999px;
    }

    .doc-meta-source {
      font-size: 0.78rem;
      color: #5c6370;
    }

    .doc-meta-source a { color: #7a8299; border-bottom-color: transparent; }
    .doc-meta-source a:hover { color: #a78bfa; }

    /* ── Loading / error states ───────────────────────────── */
    .docs-loading {
      padding: 4rem 2.5rem;
      color: #5c6370;
      font-size: 0.9rem;
    }

    .docs-error {
      padding: 2rem 2.5rem;
      color: #e06c75;
      background: rgba(224,108,117,0.08);
      border: 1px solid rgba(224,108,117,0.2);
      border-radius: 8px;
      font-size: 0.9rem;
    }

    /* ── Mobile TOC toggle button ─────────────────────────── */
    .toc-toggle {
      display: none;
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 0.6rem 1rem;
      color: #9aa0b8;
      font-size: 0.82rem;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      margin: 0.75rem 1rem 0;
      box-sizing: border-box;
    }
    .toc-toggle:hover { background: rgba(255,255,255,0.07); }

    /* ── Mobile: single column, collapsible TOC ───────────── */
    @media (max-width: 768px) {
      .docs-layout {
        grid-template-columns: 1fr;
        padding: 0 1rem 3rem;
      }
      .docs-toc-col {
        position: static;
        max-height: none;
        overflow: visible;
        border-right: none;
        padding: 0;
      }
      .docs-toc {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
        padding: 0;
        border-right: none;
      }
      .docs-toc.open {
        max-height: 70vh;
        overflow-y: auto;
        padding: 0.75rem;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 8px;
        margin-bottom: 0.5rem;
      }
      .toc-toggle { display: flex; align-items: center; gap: 0.5rem; margin: 0 0 0.5rem; }
      .docs-content { padding: 0.5rem 0; }
    }
  </style>
</head>
<body>
<header class="site-header">
  <div class="inner">
    <a id="back-link" href="library.html" class="header-back">← Back</a>
    <a href="index.html" class="site-logo">pri<span>m</span>er</a>
    <div id="doc-title-header" style="font-size:0.85rem;color:#7a8299;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></div>
    <a href="library.html" class="header-library">📚 Library</a>
  </div>
</header>

<main style="padding-top:1.5rem;">
  <div class="docs-layout">
    <!-- TOC column: toggle button (mobile only) + nav -->
    <div class="docs-toc-col">
      <button class="toc-toggle" id="toc-toggle" aria-expanded="false" onclick="
        const toc = document.getElementById('docs-toc');
        const open = toc.classList.toggle('open');
        this.setAttribute('aria-expanded', open);
        this.textContent = open ? '▲ Hide contents' : '☰ Contents';
      ">☰ Contents</button>
      <nav class="docs-toc" id="docs-toc" aria-label="Table of contents">
        <div class="toc-label">Contents</div>
        <ul class="toc-list" id="toc-list">
          <li style="color:#5c6370;font-size:0.8rem;padding:0.25rem 0.5rem;">Loading…</li>
        </ul>
      </nav>
    </div>

    <!-- Content -->
    <article class="docs-content" id="docs-content">
      <div class="docs-loading">Loading document…</div>
    </article>
  </div>
</main>

<script src="js/app.js"></script>
<script src="js/highlight.js?v=2"></script>
<script src="js/markdown.js?v=2"></script>
<script>
(function () {
  // ── Library read state ──────────────────────────────────────
  const LIBRARY_KEY = 'primer:library';
  function getLibraryReads() {
    try { return JSON.parse(localStorage.getItem(LIBRARY_KEY) || '{}'); } catch { return {}; }
  }
  function setLibraryRead(key, val) {
    const r = getLibraryReads();
    if (val) r[key] = true; else delete r[key];
    localStorage.setItem(LIBRARY_KEY, JSON.stringify(r));
  }

  // ── Book definitions (for prev/next nav) ────────────────────
  const BOOKS = {
    sre: {
      title: 'Site Reliability Engineering',
      back: 'library.html',
      chapters: ['sre_ch03','sre_ch04','sre_ch05','sre_ch06','sre_ch08','sre_ch10','sre_ch12','sre_ch15','sre_ch17','sre_ch21','sre_ch22','sre_ch23'],
    },
  };

  // ── Known docs ──────────────────────────────────────────────
  const DOCS = {
    'effective_go': {
      file: 'docs/effective_go.md',
      back: 'go.html',
      badge: 'Reference',
      source: '<a href="https://go.dev/doc/effective_go" target="_blank" rel="noopener">go.dev/doc/effective_go</a>',
    },
    'sre_ch03': {
      file: 'docs/sre-book/ch03-embracing-risk.md',
      back: 'library.html', badge: 'SRE Book · Ch. 3', book: 'sre', title: 'Embracing Risk',
      source: '<a href="https://sre.google/sre-book/embracing-risk/" target="_blank" rel="noopener">sre.google/sre-book/embracing-risk</a>',
    },
    'sre_ch04': {
      file: 'docs/sre-book/ch04-service-level-objectives.md',
      back: 'library.html', badge: 'SRE Book · Ch. 4', book: 'sre', title: 'Service Level Objectives',
      source: '<a href="https://sre.google/sre-book/service-level-objectives/" target="_blank" rel="noopener">sre.google/sre-book/service-level-objectives</a>',
    },
    'sre_ch05': {
      file: 'docs/sre-book/ch05-eliminating-toil.md',
      back: 'library.html', badge: 'SRE Book · Ch. 5', book: 'sre', title: 'Eliminating Toil',
      source: '<a href="https://sre.google/sre-book/eliminating-toil/" target="_blank" rel="noopener">sre.google/sre-book/eliminating-toil</a>',
    },
    'sre_ch06': {
      file: 'docs/sre-book/ch06-monitoring-distributed-systems.md',
      back: 'library.html', badge: 'SRE Book · Ch. 6', book: 'sre', title: 'Monitoring Distributed Systems',
      source: '<a href="https://sre.google/sre-book/monitoring-distributed-systems/" target="_blank" rel="noopener">sre.google/sre-book/monitoring-distributed-systems</a>',
    },
    'sre_ch08': {
      file: 'docs/sre-book/ch08-release-engineering.md',
      back: 'library.html', badge: 'SRE Book · Ch. 8', book: 'sre', title: 'Release Engineering',
      source: '<a href="https://sre.google/sre-book/release-engineering/" target="_blank" rel="noopener">sre.google/sre-book/release-engineering</a>',
    },
    'sre_ch10': {
      file: 'docs/sre-book/ch10-practical-alerting.md',
      back: 'library.html', badge: 'SRE Book · Ch. 10', book: 'sre', title: 'Practical Alerting',
      source: '<a href="https://sre.google/sre-book/practical-alerting/" target="_blank" rel="noopener">sre.google/sre-book/practical-alerting</a>',
    },
    'sre_ch12': {
      file: 'docs/sre-book/ch12-effective-troubleshooting.md',
      back: 'library.html', badge: 'SRE Book · Ch. 12', book: 'sre', title: 'Effective Troubleshooting',
      source: '<a href="https://sre.google/sre-book/effective-troubleshooting/" target="_blank" rel="noopener">sre.google/sre-book/effective-troubleshooting</a>',
    },
    'sre_ch15': {
      file: 'docs/sre-book/ch15-postmortem-culture.md',
      back: 'library.html', badge: 'SRE Book · Ch. 15', book: 'sre', title: 'Postmortem Culture',
      source: '<a href="https://sre.google/sre-book/postmortem-culture/" target="_blank" rel="noopener">sre.google/sre-book/postmortem-culture</a>',
    },
    'sre_ch17': {
      file: 'docs/sre-book/ch17-testing-reliability.md',
      back: 'library.html', badge: 'SRE Book · Ch. 17', book: 'sre', title: 'Testing for Reliability',
      source: '<a href="https://sre.google/sre-book/testing-reliability/" target="_blank" rel="noopener">sre.google/sre-book/testing-reliability</a>',
    },
    'sre_ch21': {
      file: 'docs/sre-book/ch21-handling-overload.md',
      back: 'library.html', badge: 'SRE Book · Ch. 21', book: 'sre', title: 'Handling Overload',
      source: '<a href="https://sre.google/sre-book/handling-overload/" target="_blank" rel="noopener">sre.google/sre-book/handling-overload</a>',
    },
    'sre_ch22': {
      file: 'docs/sre-book/ch22-cascading-failures.md',
      back: 'library.html', badge: 'SRE Book · Ch. 22', book: 'sre', title: 'Cascading Failures',
      source: '<a href="https://sre.google/sre-book/addressing-cascading-failures/" target="_blank" rel="noopener">sre.google/sre-book/addressing-cascading-failures</a>',
    },
    'sre_ch23': {
      file: 'docs/sre-book/ch23-distributed-consensus.md',
      back: 'library.html', badge: 'SRE Book · Ch. 23', book: 'sre', title: 'Distributed Consensus',
      source: '<a href="https://sre.google/sre-book/managing-critical-state/" target="_blank" rel="noopener">sre.google/sre-book/managing-critical-state</a>',
    },
  };

  // ── Read ?file= param ───────────────────────────────────────
  const params = new URLSearchParams(location.search);
  const docKey = params.get('file') || 'effective_go';
  const doc = DOCS[docKey];

  if (!doc) {
    document.getElementById('docs-content').innerHTML =
      `<div class="docs-error">Unknown document: <code>${escHtml(docKey)}</code>. ` +
      `Available: ${Object.keys(DOCS).map(k => `<code>${escHtml(k)}</code>`).join(', ')}</div>`;
    return;
  }

  // Update back link
  document.getElementById('back-link').href = doc.back;
  document.getElementById('back-link').textContent = doc.book ? '← Library' : '← Back';

  function escHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // ── Fetch and render ────────────────────────────────────────
  fetch(doc.file)
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status} — ${doc.file}`);
      return r.text();
    })
    .then(md => render(md))
    .catch(err => {
      document.getElementById('docs-content').innerHTML =
        `<div class="docs-error">Failed to load document.<br><small>${escHtml(String(err))}</small></div>`;
    });

  function render(md) {
    // Extract h1 for title
    const h1 = md.match(/^#\s+(.+)$/m);
    const title = h1 ? h1[1].replace(/`/g, '') : docKey;

    document.title = `${title} — Primer`;
    document.getElementById('doc-title-header').textContent = title;

    // Build HTML
    const html = renderMarkdown(md);

    // Build doc meta block (with optional mark-as-read button for book chapters)
    const isRead = !!getLibraryReads()[docKey];
    const markBtn = doc.book
      ? `<button class="mark-read-btn${isRead ? ' is-read' : ''}" id="mark-read-btn">${isRead ? '✓ Read' : 'Mark as read'}</button>`
      : '';
    const meta = `
      <div class="doc-meta">
        <span class="doc-meta-badge">${escHtml(doc.badge)}</span>
        <span class="doc-meta-source">Source: ${doc.source}</span>
        ${markBtn}
      </div>`;

    document.getElementById('docs-content').innerHTML = meta + html;

    // ── Build TOC ─────────────────────────────────────────
    const headings = extractHeadings(md);
    const tocList = document.getElementById('toc-list');
    tocList.innerHTML = '';

    headings.forEach(({ level, text, id }) => {
      if (level > 3) return; // only h1–h3 in TOC
      const li = document.createElement('li');
      li.className = `toc-h${level}`;
      const a = document.createElement('a');
      a.href = `#${id}`;
      a.textContent = text;
      a.addEventListener('click', e => {
        e.preventDefault();
        const target = document.getElementById(id);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        history.replaceState(null, '', `#${id}`);
      });
      li.appendChild(a);
      tocList.appendChild(li);
    });

    // ── Active section highlight (IntersectionObserver) ───
    const allAnchors = tocList.querySelectorAll('a');
    const headingEls = Array.from(
      document.getElementById('docs-content').querySelectorAll('h1,h2,h3')
    );

    if (headingEls.length === 0) return;

    // Track which heading is currently most visible
    let currentId = headingEls[0].id;

    function setActive(id) {
      if (id === currentId) return;
      currentId = id;
      allAnchors.forEach(a => {
        const isActive = a.getAttribute('href') === `#${id}`;
        a.classList.toggle('active', isActive);
        if (isActive) {
          // Scroll the TOC to show the active link
          const tocEl = document.getElementById('docs-toc');
          const linkTop = a.offsetTop;
          const tocH = tocEl.clientHeight;
          if (linkTop < tocEl.scrollTop || linkTop > tocEl.scrollTop + tocH) {
            tocEl.scrollTop = linkTop - tocH / 2;
          }
        }
      });
    }

    // Set first heading active on load
    setActive(headingEls[0].id);

    // Jump to anchor if URL has hash
    if (location.hash) {
      const target = document.querySelector(location.hash);
      if (target) setTimeout(() => target.scrollIntoView({ behavior: 'smooth' }), 100);
    }

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          setActive(entry.target.id);
        }
      });
    }, {
      rootMargin: '-10% 0px -80% 0px', // trigger when heading is near top of viewport
      threshold: 0,
    });

    headingEls.forEach(el => observer.observe(el));

    // Apply syntax highlighting to all code blocks now that they're in the DOM
    if (typeof window.highlightAll === 'function') window.highlightAll();

    // ── Mark-as-read button logic ─────────────────────────
    if (doc.book) {
      const btn = document.getElementById('mark-read-btn');
      if (btn) {
        btn.addEventListener('click', () => {
          const nowRead = !btn.classList.contains('is-read');
          setLibraryRead(docKey, nowRead);
          btn.classList.toggle('is-read', nowRead);
          btn.textContent = nowRead ? '✓ Read' : 'Mark as read';
        });
      }
    }

    // ── Prev / next chapter nav ───────────────────────────
    if (doc.book && BOOKS[doc.book]) {
      const book = BOOKS[doc.book];
      const idx = book.chapters.indexOf(docKey);
      const prevKey = idx > 0 ? book.chapters[idx - 1] : null;
      const nextKey = idx < book.chapters.length - 1 ? book.chapters[idx + 1] : null;
      const prevDoc = prevKey ? DOCS[prevKey] : null;
      const nextDoc = nextKey ? DOCS[nextKey] : null;

      const nav = document.createElement('nav');
      nav.className = 'chapter-nav';
      nav.innerHTML =
        (prevDoc
          ? `<a href="docs.html?file=${prevKey}" class="chapter-nav-link">
               <span class="chapter-nav-dir">← Previous</span>
               <span class="chapter-nav-title">${escHtml(prevDoc.title)}</span>
             </a>`
          : `<span></span>`) +
        `<a href="library.html" class="chapter-nav-home">📚 ${escHtml(book.title)}</a>` +
        (nextDoc
          ? `<a href="docs.html?file=${nextKey}" class="chapter-nav-link next">
               <span class="chapter-nav-dir">Next →</span>
               <span class="chapter-nav-title">${escHtml(nextDoc.title)}</span>
             </a>`
          : `<span></span>`);

      document.getElementById('docs-content').appendChild(nav);
    }
  }
})();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
</body>
</html>
